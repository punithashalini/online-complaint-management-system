<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>My Complaints</title>

    <link rel="stylesheet"
          href="css/dashboard.css">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="container">

    <!-- Sidebar -->

    <aside class="sidebar">

        <h2>Smart Complaint</h2>

        <ul>

            <li onclick="window.location.href='dashboard.html'">

                <i class="fa-solid fa-house"></i>

                Dashboard

            </li>

            <li onclick="window.location.href='complaint.html'">

                <i class="fa-solid fa-circle-plus"></i>

                Raise Complaint

            </li>

            <li class="active">

                <i class="fa-solid fa-list"></i>

                My Complaints

            </li>

            <li onclick="logout()">

                <i class="fa-solid fa-right-from-bracket"></i>

                Logout

            </li>

        </ul>

    </aside>

    <!-- Main -->

    <main class="main-content">

        <header>

            <div>

                <h1>My Complaints</h1>

                <p id="welcomeUser">
                    Welcome User
                </p>

            </div>

        </header>

        <!-- Search -->

        <section class="table-section">

            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">

                <input
                        type="text"
                        id="search"
                        placeholder="Search Complaint..."
                        style="width:300px;">

                <select id="statusFilter">

                    <option value="ALL">

                        All Status

                    </option>

                    <option value="PENDING">

                        Pending

                    </option>

                    <option value="IN_PROGRESS">

                        In Progress

                    </option>

                    <option value="RESOLVED">

                        Resolved

                    </option>

                </select>

            </div>

            <table>

                <thead>

                <tr>

                    <th>ID</th>

                    <th>Title</th>

                    <th>Description</th>

                    <th>Priority</th>

                    <th>Status</th>

                </tr>

                </thead>

                <tbody id="complaintTable">

                </tbody>

            </table>

        </section>

    </main>

</div>

<script src="js/mycomplaints.js"></script>

</body>

</html>
